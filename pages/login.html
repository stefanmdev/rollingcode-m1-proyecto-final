<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Streamix - Iniciar sesión" />
    <meta name="author" content="RollingCode School - Grupo Streamix" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/login.css" />
    <title>Streamix - Iniciar Sesión</title>
  </head>
  <body>
    <header>
      <nav class="navbar navbar-dark fixed-top">
        <div class="container-fluid">
          <a class="navbar-brand" href="../index.html">STREAMIX</a>
        </div>
      </nav>
    </header>

    <main class="flex-grow-1 d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 70px);">
      <div class="container d-flex justify-content-center">
        <div class="login-card p-4 p-sm-5">
          <h2 class="text-start mb-1 login-title">Iniciar sesión</h2>
          <p class="text-start mb-4 text-muted fs-7">Ingresá a tu cuenta de STREAMIX</p>

          <form>
            <div class="mb-3 text-start">
              <label for="emailInput" class="form-label small text-secondary">Email</label>
              <input type="email" class="form-control login-input" id="emailInput" placeholder="usuario@email.com" required autocomplete="email" />
            </div>

            <div class="mb-2 text-start">
              <label for="passwordInput" class="form-label small text-secondary">Contraseña</label>
              <div class="input-group">
                <input type="password" class="form-control login-input border-end-0" id="passwordInput" placeholder="•••••••••" required autocomplete="current-password" />
                <span class="input-group-text login-input border-start-0 text-muted cursor-pointer"><i class="bi bi-eye"></i></span>
              </div>
            </div>

            <div class="text-end mb-4">
              <a href="#" class="forgot-password-link small text-decoration-none">¿Olvidaste tu contraseña?</a>
            </div>
            </form>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  </body>
</html>
